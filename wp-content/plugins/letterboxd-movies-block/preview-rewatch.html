<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewatch icon preview</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0ebe3;
    padding: 40px;
    color: #333;
  }

  h2 {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
    color: #666;
  }

  .lbm-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    max-width: 900px;
  }

  .lbm-card {
    text-decoration: none;
    color: inherit;
  }

  .lbm-card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 8px;
    display: block;
  }

  .lbm-title {
    font-size: 0.95rem;
    margin: 0.5rem 0 0.2rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .lbm-rating {
    font-size: 0.85rem;
    color: #c0392b;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .lbm-rewatch {
    display: inline-flex;
    align-items: center;
    color: #c0392b;
    opacity: 0.85;
  }

  .lbm-rewatch svg {
    width: 13px;
    height: 13px;
  }

  /* варіанти іконки */
  .variants {
    display: flex;
    flex-direction: column;
    gap: 32px;
    max-width: 900px;
    margin-top: 48px;
  }

  .variant-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    margin-bottom: 8px;
  }

  .demo-rating {
    font-size: 1rem;
    color: #c0392b;
    display: flex;
    align-items: center;
    gap: 5px;
  }
</style>
</head>
<body>

<h2>Останні фільми з Letterboxd</h2>

<div class="lbm-grid">

  <!-- Звичайний перегляд -->
  <a href="#" class="lbm-card">
    <img src="https://a.ltrbxd.com/resized/film-poster/1/0/2/5/0/4/7/1025047-the-phoenician-scheme-0-600-0-900-crop.jpg" alt="The Phoenician Scheme">
    <p class="lbm-title">The Phoenician Scheme, 2025</p>
    <div class="lbm-rating">★★★★</div>
  </a>

  <!-- Rewatch — варіант 1: іконка перед зірками -->
  <a href="#" class="lbm-card">
    <img src="https://a.ltrbxd.com/resized/film-poster/1/3/3/5/5/9/8/1335598-dan-da-dan-evil-eye-0-600-0-900-crop.jpg" alt="Sinners">
    <p class="lbm-title">Sinners, 2025</p>
    <div class="lbm-rating">
      <span class="lbm-rewatch" title="Rewatch">
        <!-- іконка ↺ -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
        </svg>
      </span>
      ★★★½
    </div>
  </a>

  <!-- Rewatch — варіант 2: інша іконка (два кола) -->
  <a href="#" class="lbm-card">
    <img src="https://a.ltrbxd.com/resized/film-poster/1/3/3/5/5/9/8/1335598-dan-da-dan-evil-eye-0-600-0-900-crop.jpg" alt="Project Hail Mary">
    <p class="lbm-title">Project Hail Mary, 2026</p>
    <div class="lbm-rating">
      <span class="lbm-rewatch" title="Rewatch">
        <!-- іконка refresh -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
      </span>
      ★★★★
    </div>
  </a>

  <!-- Звичайний без рейтингу -->
  <a href="#" class="lbm-card">
    <img src="https://a.ltrbxd.com/resized/film-poster/1/0/2/5/0/4/7/1025047-the-phoenician-scheme-0-600-0-900-crop.jpg" alt="Film">
    <p class="lbm-title">Louis Theroux: Inside the Manosphere, 2026</p>
    <div class="lbm-rating">★★★</div>
  </a>

</div>

<div class="variants">
  <div>
    <div class="variant-label">Варіант A — іконка ↺ (стрілка-дуга)</div>
    <div class="demo-rating">
      <span class="lbm-rewatch" title="Rewatch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
        </svg>
      </span>
      ★★★½
    </div>
  </div>

  <div>
    <div class="variant-label">Варіант B — іконка refresh (заповнена)</div>
    <div class="demo-rating">
      <span class="lbm-rewatch" title="Rewatch">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
      </span>
      ★★★½
    </div>
  </div>

  <div>
    <div class="variant-label">Варіант C — текстова мітка</div>
    <div class="demo-rating">
      <span style="font-size:0.7rem; font-weight:600; letter-spacing:0.05em; opacity:0.7;">REWATCH</span>
      ★★★½
    </div>
  </div>
</div>

</body>
</html>
