name: Deploy theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync theme to public_html via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            echo "=== git-deploy (all) ===" && ls -la ~/git-deploy/
            echo "=== domains ===" && ls ~/domains/
            echo "=== sync-deploy.sh ===" && cat ~/sync-deploy.sh
