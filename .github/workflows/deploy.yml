name: Deploy theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync theme to public_html via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            echo "=== Home dir ===" && ls ~
            echo "=== git-deploy ===" && ls ~/git-deploy/ 2>/dev/null || echo "NOT FOUND"
            echo "=== public_html/themes ===" && ls ~/public_html/wp-content/themes/ 2>/dev/null || echo "NOT FOUND"
